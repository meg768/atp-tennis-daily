<!doctype html>
<html lang="sv" class="{{themeClass}}">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{pageTitle}}</title>
		<meta name="description" content="{{pageDescription}}" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />
		<script>
			(function () {
			  const STORAGE_KEY = 'tennis-daily-theme';
			  const SURFACES = ['hard', 'grass', 'clay'];
			  const themeParam = new URLSearchParams(window.location.search).get('theme');
			  const validTheme = /^(light|dark) (hard|clay|grass)$/;

			  const palettes = {
			    light: {
			      hard: {
			        '--theme-base': '#5482b0',
			        '--theme-dark': '#203346',
			        '--theme-soft': '#eef2f7',
			        '--theme-soft-2': '#dce6ef',
			        '--canvas-top': '#f5f8fb',
			        '--canvas': '#edf3f8',
			        '--canvas-bottom': '#e5edf5',
			        '--paper': 'rgba(255, 255, 255, 0.96)',
			        '--paper-soft': '#f8fbfd',
			        '--ink': '#101a23',
			        '--muted': '#4a6074',
			        '--rule': 'rgba(50, 79, 108, 0.18)',
			        '--accent-dark': '#324f6c',
			        '--accent-soft': '#779cc0',
			        '--card-surface': '#f7fbff',
			        '--shadow': '0 18px 40px rgba(32, 51, 70, 0.08)',
			        '--page-glow': 'rgba(84, 130, 176, 0.12)',
			        '--page-glow-soft': 'rgba(84, 130, 176, 0.06)',
			        '--panel-surface': '#f1f6fb',
			        '--block-surface': '#f8fbfe',
			        '--callout-surface': '#edf4fa',
			        '--footer-surface': 'color-mix(in srgb, var(--theme-base) 6%, white)',
			        '--flag-surface': 'rgba(255, 255, 255, 0.82)',
			        '--flag-border': 'rgba(84, 130, 176, 0.22)',
			        '--copy': '#203346',
			        '--copy-soft': '#31485b'
			      },
			      clay: {
			        '--theme-base': '#d96b47',
			        '--theme-dark': '#703328',
			        '--theme-soft': '#fdf7f4',
			        '--theme-soft-2': '#fceee6',
			        '--canvas-top': '#fdf7f4',
			        '--canvas': '#f9efe8',
			        '--canvas-bottom': '#f6e6dc',
			        '--paper': 'rgba(255, 255, 255, 0.96)',
			        '--paper-soft': '#fdf8f5',
			        '--ink': '#34160f',
			        '--muted': '#7b4b38',
			        '--rule': 'rgba(146, 65, 49, 0.18)',
			        '--accent-dark': '#924131',
			        '--accent-soft': '#e78e6c',
			        '--card-surface': '#fff8f4',
			        '--shadow': '0 18px 40px rgba(112, 51, 40, 0.08)',
			        '--page-glow': 'rgba(217, 107, 71, 0.16)',
			        '--page-glow-soft': 'rgba(217, 107, 71, 0.08)',
			        '--panel-surface': '#faeee6',
			        '--block-surface': '#fff9f6',
			        '--callout-surface': '#f6e7dd',
			        '--footer-surface': 'rgba(249, 236, 227, 0.78)',
			        '--flag-surface': 'rgba(255, 248, 244, 0.86)',
			        '--flag-border': 'rgba(146, 65, 49, 0.22)',
			        '--copy': '#4a241b',
			        '--copy-soft': '#6f4536'
			      },
			      grass: {
			        '--theme-base': '#4b9e4b',
			        '--theme-dark': '#235023',
			        '--theme-soft': '#f5fbf5',
			        '--theme-soft-2': '#e6f6e6',
			        '--canvas-top': '#f5fbf5',
			        '--canvas': '#edf7ed',
			        '--canvas-bottom': '#e1f0e1',
			        '--paper': 'rgba(255, 255, 255, 0.96)',
			        '--paper-soft': '#f8fcf8',
			        '--ink': '#0f250f',
			        '--muted': '#3f6840',
			        '--rule': 'rgba(46, 104, 46, 0.18)',
			        '--accent-dark': '#2e682e',
			        '--accent-soft': '#6cb86c',
			        '--card-surface': '#fbfffb',
			        '--shadow': '0 18px 40px rgba(35, 80, 35, 0.08)',
			        '--page-glow': 'rgba(75, 158, 75, 0.15)',
			        '--page-glow-soft': 'rgba(75, 158, 75, 0.07)',
			        '--panel-surface': '#ebf6eb',
			        '--block-surface': '#fafffa',
			        '--callout-surface': '#e2f1e2',
			        '--footer-surface': 'rgba(234, 246, 234, 0.78)',
			        '--flag-surface': 'rgba(248, 253, 248, 0.86)',
			        '--flag-border': 'rgba(46, 104, 46, 0.22)',
			        '--copy': '#173317',
			        '--copy-soft': '#355335'
			      }
			    },
			    dark: {
			      hard: {
			        '--theme-base': '#6f95bb',
			        '--theme-dark': '#d9e6f2',
			        '--theme-soft': '#17222d',
			        '--theme-soft-2': '#243443',
			        '--canvas-top': '#0a1219',
			        '--canvas': '#0d1822',
			        '--canvas-bottom': '#13212d',
			        '--paper': 'rgba(16, 27, 37, 0.96)',
			        '--paper-soft': '#15212c',
			        '--ink': '#edf4fb',
			        '--muted': '#a8bfd5',
			        '--rule': 'rgba(144, 173, 201, 0.24)',
			        '--accent-dark': '#b8d0e7',
			        '--accent-soft': '#7ea6cd',
			        '--card-surface': '#162432',
			        '--shadow': '0 20px 42px rgba(0, 0, 0, 0.28)',
			        '--page-glow': 'rgba(84, 130, 176, 0.18)',
			        '--page-glow-soft': 'rgba(84, 130, 176, 0.1)',
			        '--panel-surface': '#213445',
			        '--block-surface': '#1a2a38',
			        '--callout-surface': '#253a4c',
			        '--footer-surface': 'rgba(21, 35, 48, 0.92)',
			        '--flag-surface': 'rgba(20, 33, 45, 0.95)',
			        '--flag-border': 'rgba(144, 173, 201, 0.28)',
			        '--copy': '#e7f1fa',
			        '--copy-soft': '#bfd0e1'
			      },
			      clay: {
			        '--theme-base': '#e38a68',
			        '--theme-dark': '#fee6db',
			        '--theme-soft': '#2a1813',
			        '--theme-soft-2': '#3a2119',
			        '--canvas-top': '#190d09',
			        '--canvas': '#23120d',
			        '--canvas-bottom': '#2c1811',
			        '--paper': 'rgba(36, 21, 16, 0.96)',
			        '--paper-soft': '#311d16',
			        '--ink': '#fff2ec',
			        '--muted': '#e1b3a2',
			        '--rule': 'rgba(227, 138, 104, 0.24)',
			        '--accent-dark': '#ffd6c6',
			        '--accent-soft': '#efab91',
			        '--card-surface': '#2e1c16',
			        '--shadow': '0 20px 42px rgba(0, 0, 0, 0.3)',
			        '--page-glow': 'rgba(217, 107, 71, 0.22)',
			        '--page-glow-soft': 'rgba(217, 107, 71, 0.12)',
			        '--panel-surface': '#4a2a1f',
			        '--block-surface': '#38211a',
			        '--callout-surface': '#553023',
			        '--footer-surface': 'rgba(47, 27, 20, 0.92)',
			        '--flag-surface': 'rgba(49, 29, 22, 0.95)',
			        '--flag-border': 'rgba(227, 138, 104, 0.28)',
			        '--copy': '#fff1e9',
			        '--copy-soft': '#ecc7b7'
			      },
			      grass: {
			        '--theme-base': '#73b873',
			        '--theme-dark': '#def5de',
			        '--theme-soft': '#132113',
			        '--theme-soft-2': '#1c2f1c',
			        '--canvas-top': '#091309',
			        '--canvas': '#0d1a0d',
			        '--canvas-bottom': '#142314',
			        '--paper': 'rgba(19, 33, 19, 0.96)',
			        '--paper-soft': '#1a2b1a',
			        '--ink': '#eefbee',
			        '--muted': '#b0d7b0',
			        '--rule': 'rgba(115, 184, 115, 0.24)',
			        '--accent-dark': '#d5f1d5',
			        '--accent-soft': '#97cf97',
			        '--card-surface': '#1a2d1a',
			        '--shadow': '0 20px 42px rgba(0, 0, 0, 0.28)',
			        '--page-glow': 'rgba(75, 158, 75, 0.2)',
			        '--page-glow-soft': 'rgba(75, 158, 75, 0.1)',
			        '--panel-surface': '#294229',
			        '--block-surface': '#203520',
			        '--callout-surface': '#315031',
			        '--footer-surface': 'rgba(22, 38, 22, 0.92)',
			        '--flag-surface': 'rgba(22, 38, 22, 0.95)',
			        '--flag-border': 'rgba(115, 184, 115, 0.28)',
			        '--copy': '#eef9ee',
			        '--copy-soft': '#c5dfc5'
			      }
			    }
			  };

			  const root = document.documentElement;
			  const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

			  function normalizeTheme(themeValue) {
			    return themeValue && validTheme.test(themeValue) ? themeValue : null;
			  }

			  function getInitialSurface() {
			    if (root.classList.contains('theme-clay')) return 'clay';
			    if (root.classList.contains('theme-grass')) return 'grass';
			    return 'hard';
			  }

			  function getDefaultTheme() {
			    return `${mediaQuery.matches ? 'dark' : 'light'} ${getInitialSurface()}`;
			  }

			  function getStoredTheme() {
			    return normalizeTheme(window.localStorage.getItem(STORAGE_KEY));
			  }

			  function getUrlTheme() {
			    return normalizeTheme(themeParam);
			  }

			  function applyTheme(themeValue, { persist = false, updateUrl = false } = {}) {
			    const normalizedTheme = normalizeTheme(themeValue);

			    if (!normalizedTheme) {
			      return;
			    }

			    const [mode, surface] = normalizedTheme.split(' ');
			    const palette = palettes[mode]?.[surface];

			    if (!palette) {
			      return;
			    }

			    root.classList.remove('theme-hard', 'theme-clay', 'theme-grass');
			    root.classList.add(`theme-${surface}`);
			    root.dataset.mode = mode;
			    root.dataset.themeValue = normalizedTheme;
			    root.style.colorScheme = mode;

			    Object.entries(palette).forEach(([name, value]) => {
			      root.style.setProperty(name, value);
			    });

			    if (persist) {
			      window.localStorage.setItem(STORAGE_KEY, normalizedTheme);
			    }

			    if (updateUrl) {
			      const url = new URL(window.location.href);
			      url.searchParams.set('theme', normalizedTheme);
			      window.history.replaceState({}, '', url);
			    }
			  }

			  function getActiveTheme() {
			    return normalizeTheme(root.dataset.themeValue) || getUrlTheme() || getStoredTheme() || getDefaultTheme();
			  }

			  function toggleMode() {
			    const [mode, surface] = getActiveTheme().split(' ');
			    const nextMode = mode === 'dark' ? 'light' : 'dark';

			    applyTheme(`${nextMode} ${surface}`, { persist: true, updateUrl: true });
			  }

			  function toggleSurface() {
			    const [mode, surface] = getActiveTheme().split(' ');
			    const currentSurfaceIndex = SURFACES.indexOf(surface);
			    const nextSurface = SURFACES[(currentSurfaceIndex + 1) % SURFACES.length];

			    applyTheme(`${mode} ${nextSurface}`, { persist: true, updateUrl: true });
			  }

			  function normalizeIsoDateValue(value) {
			    const text = String(value || '').trim();
			    const match = text.match(/^(\d{4}-\d{2}-\d{2})(?:[T\s].*)?$/);
			    return match ? match[1] : text;
			  }

			  function isPlaceholderText(value) {
			    return /^\s*\{\{[^}]+\}\}\s*$/.test(String(value || '').trim());
			  }

			  function buildEditablePreviewSections() {
			    const source = document.getElementById('fixed-match-section-template');
			    if (!source) {
			      return [];
			    }

			    const first = source.content.firstElementChild?.cloneNode(true);
			    return [first].filter(Boolean);
			  }

			  function hydrateEditablePreview() {
			    const rail = document.querySelector('.masthead__rail');
			    const title = document.querySelector('.masthead__title');
			    const dateLine = document.querySelector('.masthead__date');
			    const matchList = document.querySelector('.match-list');
			    const footer = document.querySelector('.footer-note');

			    if (rail && isPlaceholderText(rail.textContent)) {
			      rail.innerHTML = '<span>Tennis Daily</span><span>ATP Tennis</span><span>Uppdaterad {{Show current time only}}</span>';
			    }

			    if (title && isPlaceholderText(title.textContent)) {
			      title.textContent = 'Tennis Daily';
			    }

			    if (dateLine && isPlaceholderText(dateLine.textContent)) {
			      dateLine.textContent = '{{Show current date in long format}}';
			    }

			    if (footer && isPlaceholderText(footer.textContent)) {
			      footer.textContent = 'Den här vyn visar exempeldata direkt i template.html så att layout, boxar och rubriker kan justeras visuellt utan att en ny scan först måste köras.';
			    }

			    if (matchList && isPlaceholderText(matchList.textContent)) {
			      document.body.classList.add('is-template-preview');
			      matchList.innerHTML = '';
			      buildEditablePreviewSections().forEach(section => {
			        matchList.appendChild(section);
			      });
			    }

			    if (isPlaceholderText(document.title)) {
			      document.title = 'Tennis Daily Template Preview';
			    }
			  }

			  function normalizeRecentResultParts(player, outcome, opponent, score) {
			    const name = String(player || '').trim();
			    const foe = String(opponent || '').trim();
			    const rawOutcome = String(outcome || '').trim().toUpperCase();
			    const scoreText = String(score || '').trim();

			    if (rawOutcome === 'L') {
			      return { winner: foe, loser: name, result: scoreText };
			    }

			    return { winner: name, loser: foe, result: scoreText };
			  }

			  function formatRecentPlayersCell(winner, loser) {
			    return [String(winner || '').trim(), String(loser || '').trim()].filter(Boolean).join(' vs ');
			  }

			  function parseHeadToHeadResultText(value) {
			    const text = String(value || '').trim();
			    const match = text.match(/^(.*?)\s+(?:slog|besegrade|def\.?|defeated|beat)\s+(.*?)\s+([0-9].*)$/i);

			    if (!match) {
			      return { players: '', result: text };
			    }

			    const [, winner, loser, result] = match;
			    return {
			      players: formatRecentPlayersCell(winner, loser),
			      result: String(result || '').trim()
			    };
			  }

			  function isRecentResultsBlock(block, label) {
			    if (block.classList.contains('match-block--recent-results')) {
			      return true;
			    }

			    return label?.textContent.trim() === 'Senaste resultat';
			  }

			  function getBlockRole(block) {
			    const label = block.querySelector('.match-block__label');
			    const text = label?.textContent.trim() || '';

			    if (block.classList.contains('match-block--odds') || text === 'Odds') return 'odds';
			    if (block.classList.contains('match-block--play') || text === 'Spelbild') return 'play';
			    if (block.classList.contains('match-block--form') || text === 'Form och historik') return 'form';
			    if (block.classList.contains('match-block--head-to-head') || text === 'Head-to-head') return 'head-to-head';
			    if (block.classList.contains('match-block--status') || text === 'Skador och dagsläge') return 'status';
			    if (block.classList.contains('match-block--win-rate') || text === 'Vinstprocent') return 'win-rate';
			    if (block.classList.contains('match-block--recent-results') || text === 'Senaste resultat') return 'recent-results';
			    if (block.classList.contains('match-block--market') || text === 'Marknad och modell') return 'market';
			    if (block.classList.contains('match-block--decider') || text === 'Det avgör') return 'decider';

			    return null;
			  }

			  function ensureMatchSectionStructure() {
			    const roleClassMap = {
			      odds: 'match-block--odds',
			      play: 'match-block--play',
			      form: 'match-block--form',
			      'head-to-head': 'match-block--head-to-head',
			      status: 'match-block--status',
			      'win-rate': 'match-block--win-rate',
			      'recent-results': 'match-block--recent-results',
			      market: 'match-block--market',
			      decider: 'match-block--decider'
			    };

			    const mainOrder = ['play', 'form', 'win-rate', 'recent-results', 'head-to-head', 'status', 'market', 'decider'];

			    document.querySelectorAll('.match-section').forEach(section => {
			      const blocks = Array.from(section.querySelectorAll('.match-block'));
			      if (!blocks.length) {
			        return;
			      }

			      const existingBody = Array.from(section.children).find(child => child.classList?.contains('match-body')) || null;
			      const primaryOdds = [];
			      const roleBuckets = new Map();
			      const extras = [];

			      blocks.forEach(block => {
			        const role = getBlockRole(block);
			        if (role && roleClassMap[role]) {
			          block.classList.add(roleClassMap[role]);
			        }

			        if (role === 'odds') {
			          block.classList.add('match-block--primary', 'match-block--odds');
			          primaryOdds.push(block);
			          return;
			        }

			        if (role) {
			          if (!roleBuckets.has(role)) {
			            roleBuckets.set(role, []);
			          }
			          roleBuckets.get(role).push(block);
			          return;
			        }

			        extras.push(block);
			      });

			      const body = document.createElement('div');
			      body.className = 'match-body';

			      const main = document.createElement('div');
			      main.className = 'match-copy';

			      mainOrder.forEach(role => {
			        (roleBuckets.get(role) || []).forEach(block => main.appendChild(block));
			      });

			      extras.forEach(block => main.appendChild(block));
			      body.append(main);

			      if (existingBody) {
			        existingBody.replaceWith(body);
			      } else {
			        const insertAfter = primaryOdds.at(-1)
			          || Array.from(section.children).find(child => child.classList?.contains('match-meta'))
			          || Array.from(section.children).find(child => child.classList?.contains('match-section__summary'));

			        if (insertAfter?.parentNode === section) {
			          insertAfter.insertAdjacentElement('afterend', body);
			        } else {
			          section.appendChild(body);
			        }
			      }
			    });
			  }

			  function normalizeRecentResultsTables() {
			    document.querySelectorAll('.match-block').forEach(block => {
			      const label = block.querySelector('.match-block__label');
			      const tables = Array.from(block.querySelectorAll('.mini-table'));

			      if (!label || !tables.length) {
			        return;
			      }

			      if (!isRecentResultsBlock(block, label)) {
			        return;
			      }

			      block.classList.add('match-block--recent-results');
			      tables.forEach(table => {
			        table.classList.add('mini-table--recent-results');

			        const headRow = table.querySelector('thead tr');
			        if (headRow) {
			          headRow.innerHTML = '<th>Datum</th><th>Spelare</th><th>Resultat</th>';
			        }

			        table.querySelectorAll('tbody tr').forEach(row => {
			          const cells = Array.from(row.querySelectorAll('td'));
			          if (cells.length === 3) {
			            cells[0].textContent = normalizeIsoDateValue(cells[0].textContent);
			            return;
			          }

			          if (cells.length === 4) {
			            const date = normalizeIsoDateValue(cells[0].textContent);
			            const winner = cells[1].textContent;
			            const loser = cells[2].textContent;
			            const result = cells[3].textContent;
			            const players = formatRecentPlayersCell(winner, loser);

			            row.innerHTML = `<td>${date}</td><td>${players}</td><td>${result}</td>`;
			            return;
			          }

			          if (cells.length < 5) {
			            return;
			          }

			          const date = normalizeIsoDateValue(cells[0].textContent);
			          const player = cells[1].textContent;
			          const outcome = cells[2].textContent;
			          const opponent = cells[3].textContent;
			          const score = cells[4]?.textContent || '';
			          const { winner, loser, result } = normalizeRecentResultParts(player, outcome, opponent, score);
			          const players = formatRecentPlayersCell(winner, loser);

			          row.innerHTML = `<td>${date}</td><td>${players}</td><td>${result}</td>`;
			        });
			      });
			    });
			  }

			  function normalizeHeadToHeadTables() {
			    document.querySelectorAll('.match-block').forEach(block => {
			      const label = block.querySelector('.match-block__label');
			      const table = block.querySelector('.mini-table');

			      if (!label || !table) {
			        return;
			      }

			      if (label.textContent.trim() !== 'Head-to-head') {
			        return;
			      }

			      table.classList.add('mini-table--head-to-head');

			      const headRow = table.querySelector('thead tr');
			      if (headRow) {
			        headRow.innerHTML = '<th>Datum</th><th>Spelare</th><th>Resultat</th>';
			      }

			      table.querySelectorAll('tbody tr').forEach(row => {
			        const cells = Array.from(row.querySelectorAll('td'));
			        if (cells.length === 3) {
			          cells[0].textContent = normalizeIsoDateValue(cells[0].textContent);
			          return;
			        }

			        if (cells.length < 4) {
			          return;
			        }

			        const date = normalizeIsoDateValue(cells[0].textContent);
			        const rawResult = cells[3].textContent;
			        const { players, result } = parseHeadToHeadResultText(rawResult);

			        row.innerHTML = `<td>${date}</td><td>${players}</td><td>${result}</td>`;
			      });
			    });
			  }

			  function normalizeRenderedContent() {
			    hydrateEditablePreview();
			    ensureMatchSectionStructure();

			    document.querySelectorAll('.match-title__flag').forEach(flag => {
			      flag.textContent = '';
			      flag.setAttribute('aria-hidden', 'true');
			    });

			    document.querySelectorAll('.mini-table tbody tr td:first-child').forEach(cell => {
			      cell.textContent = normalizeIsoDateValue(cell.textContent);
			    });

			    normalizeRecentResultsTables();
			    normalizeHeadToHeadTables();
			  }

			  const initialTheme = getUrlTheme() || getStoredTheme();
			  root.dataset.themeValue = initialTheme || getDefaultTheme();

			  if (initialTheme) {
			    applyTheme(initialTheme, { persist: true });
			  }

			  window.addEventListener('keydown', event => {
			    if (event.defaultPrevented) {
			      return;
			    }

			    if (event.metaKey || event.ctrlKey || event.altKey || event.shiftKey) {
			      return;
			    }

			    const target = event.target;
			    const tagName = target?.tagName;
			    if (tagName === 'INPUT' || tagName === 'TEXTAREA' || target?.isContentEditable) {
			      return;
			    }

			    if (event.key === 'F3') {
			      event.preventDefault();
			      toggleSurface();
			      return;
			    }

			    if (event.key === 'F6') {
			      event.preventDefault();
			      toggleMode();
			    }
			  });

			  document.addEventListener('DOMContentLoaded', normalizeRenderedContent);
			})();
		</script>
		<style>
			:root {
			  --font-sans: "Lato", "Helvetica Neue", Arial, sans-serif;
			  --font-serif: "Libre Baskerville", Georgia, serif;
			  --theme-base: #5482b0;
			  --theme-dark: #203346;
			  --theme-soft: #eef2f7;
			  --theme-soft-2: #dce6ef;
			  --canvas-top: #f5f8fb;
			  --canvas: #edf3f8;

			* {
			  box-sizing: border-box;
			}

			html {
			  background: var(--canvas-bottom);
			  color: var(--ink);
			  font-size: 16px;
			  color-scheme: light dark;
			}

			body {
			  margin: 0;
			  font-family: var(--font-sans);
			}

			a {
			  color: inherit;
			  text-decoration: none;
			}

			.page-shell {
			  width: min(1180px, calc(100vw - 1.5rem));
			  margin: 0.9rem auto 1.5rem;
			  padding: 0.75rem;
			}

			.masthead {
			  padding: 1rem 1rem 1.1rem;
			  background: var(--card-surface);
			  border: 1px solid var(--rule);
			  border-radius: 0.45rem;
			  box-shadow: var(--shadow);
			  position: relative;
			  overflow: hidden;
			}

			.masthead__rail,
			.masthead__date,
			.match-meta__item,
			.match-block__label,
			.footer-note {
			  font-family: var(--font-sans);
			  letter-spacing: 0.1em;
			  text-transform: uppercase;
			}

			.masthead__rail {
			  display: flex;
			  gap: 1rem;
			  padding: 0 0 0.8rem 0.55rem;
			  border-bottom: 1px solid var(--rule);
			  color: var(--muted);
			  font-size: var(--type-rail-size);
			  font-weight: 700;
			}

			.masthead__rail > * {
			  flex: 1 1 0;
			}

			.masthead__rail > :first-child {
			  text-align: left;
			}

			.masthead__rail > :nth-child(2) {
			  text-align: center;
			}

			.masthead__rail > :last-child {
			  text-align: right;
			}

			.masthead__title {
			  margin: 0.95rem 0 0.55rem;
			  font-family: var(--font-serif);
			  font-size: clamp(2rem, 4.4vw, 3.5rem);
			  line-height: 0.92;
			  letter-spacing: 0.01em;
			  text-transform: none;
			  font-weight: 700;
			  text-align: center;
			  color: var(--theme-dark);
			}

			.masthead__date {
			  margin: 0;
			  color: var(--accent-dark);
			  font-size: 0.72rem;
			  text-align: center;
			  font-weight: 700;
			}

			.masthead__deck {
			  margin: 0.8rem auto 0;
			  max-width: 72ch;
			  font-family: var(--font-serif);
			  font-size: 1.02rem;
			  line-height: 1.65;
			  color: var(--muted);
			  text-align: center;
			}

			.match-list {
			  display: grid;
			  gap: 0.85rem;
			  margin-top: 0.9rem;
			}

			.template-spec {
			  display: none;
			  margin: 0 0 0.7rem;
			  padding: 0.72rem 0.8rem;
			  background: var(--panel-surface);
			  border: 1px dashed var(--rule);
			  border-radius: 0.35rem;
			  color: var(--copy-soft);
			  font-family: var(--font-sans);
			  font-size: var(--type-spec-size);
			  line-height: 1.5;
			  text-transform: none;
			  letter-spacing: 0;
			}

			.is-template-preview .template-spec {
			  display: block;
			}

			.template-preview-label {
			  display: none;
			  margin: 0 0 0.35rem;
			  color: var(--theme-base);
			  font-family: var(--font-sans);
			  font-size: 0.72rem;
			  font-weight: 900;
			  letter-spacing: 0.08em;
			  text-transform: uppercase;
			}

			.is-template-preview .template-preview-label {
			  display: block;
			}

			.template-spec__title {
			  margin: 0 0 0.3rem;
			  color: var(--theme-base);
			  font-family: var(--font-sans);
			  font-size: var(--type-spec-size);
			  font-weight: 900;
			  letter-spacing: 0;
			  text-transform: none;

			.template-spec p,

			  line-height: var(--leading-body);
			  color: var(--copy);

			.template-spec p + p,

			.template-spec p + ul {
			  margin-top: 0.35rem;

			.template-spec ul {
			  margin: 0.35rem 0 0;
			  padding-left: 1rem;
			}

			.match-section {
			  padding: 0.95rem;

			.match-section__title {

			  display: flex;
			  flex-wrap: wrap;
			  align-items: center;
			  column-gap: 0.5rem;
			  row-gap: 0.22rem;
			  font-family: var(--font-sans);
			  font-size: clamp(1.18rem, 1.7vw, 1.42rem);
			  line-height: 1.08;
			  letter-spacing: -0.028em;
			  font-weight: 600;
			}

			.match-title__side,
			.match-title__player {
			  display: inline-flex;
			  align-items: center;
			  align-self: center;
			  flex-wrap: wrap;
			  gap: 0.54rem;
			  min-width: 0;
			}

			.match-title__flag {
			  display: inline-flex;
			  align-items: center;
			  justify-content: center;
			  width: 3em;
			  height: 3em;
			  min-width: 3em;
			  min-height: 3em;
			  padding: 0;
			  border: 1px solid color-mix(in srgb, var(--theme-dark) 46%, white);
			  border-radius: 999px;
			  background: var(--flag-surface);
			  background-repeat: no-repeat;
			  background-position: center center;
			  background-size: cover;
			  box-shadow: 0 1px 0 color-mix(in srgb, var(--theme-dark) 14%, transparent);
			  overflow: hidden;
			  flex: 0 0 auto;

			  font-weight: 700;
			  letter-spacing: 0.04em;

			  text-transform: uppercase;
			  text-indent: 120%;
			  white-space: nowrap;

			.match-title__name {

			  align-items: center;
			  align-self: center;
			  min-width: 0;
			  color: inherit;
			  line-height: 1.02;

			.match-title__detail {
			  display: inline-flex;
			  align-items: center;
			  align-self: center;
			  color: inherit;
			  font-family: var(--font-sans);
			  font-size: 0.92em;
			  letter-spacing: -0.01em;
			  white-space: nowrap;
			  font-weight: 600;
			  line-height: 1;
			}

			.match-title__country {
			  color: inherit;
			  font-family: var(--font-sans);
			  font-size: 0.92em;
			  letter-spacing: -0.01em;
			  white-space: nowrap;
			  font-weight: 600;
			}

			.match-title__rank {
			  color: inherit;
			  font-family: var(--font-sans);
			  font-size: 0.92em;
			  letter-spacing: 0;
			  white-space: nowrap;
			  font-weight: 600;
			}

			.match-title__separator {
			  display: inline-flex;
			  align-items: center;
			  align-self: center;
			  color: inherit;
			  font-size: 0.88em;
			  margin: 0 0.12rem 0 0.02rem;
			  line-height: 1;
			  font-weight: 500;
			  text-transform: lowercase;
			  transform: none;
			}

			.match-section__summary {
			  margin: 0.65rem 0 0;
			  max-width: 70ch;
			  font-family: var(--font-serif);
			  font-size: var(--type-summary-size);
			  line-height: var(--leading-summary);
			  color: var(--copy-soft);

			.match-overview {
			  display: grid;
			  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			  gap: 0.75rem;
			  margin-top: 0.95rem;
			}

			.match-overview__item {
			  padding: 0.82rem;
			  background: color-mix(in srgb, var(--panel-surface) 82%, var(--paper) 18%);
			  border: 1px solid var(--rule);
			  border-radius: 0.35rem;
			  min-width: 0;
			}

			.match-overview__label {
			  display: block;
			  color: var(--theme-base);
			  font-family: var(--font-sans);
			  font-size: var(--type-label-size);
			  font-weight: 700;
			  letter-spacing: 0.08em;
			  text-transform: uppercase;
			}

			.match-overview__item strong {
			  display: block;
			  margin-top: 0.36rem;
			  color: var(--ink);
			  font-family: var(--font-serif);
			  font-size: var(--type-meta-size);
			  line-height: 1.35;
			  font-weight: 400;
			  letter-spacing: 0;
			}

			.match-meta {
			  display: grid;
			  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			  gap: 0.75rem;
			  margin-top: 1rem;
			}

			.match-meta__item {
			  padding: 0.82rem;
			  background: var(--panel-surface);
			  border: 1px solid var(--rule);
			  border-radius: 0.35rem;
			  color: var(--muted);
			  font-size: var(--type-label-size);
			  font-weight: 700;
			}

			.match-meta__item strong {
			  display: block;
			  margin-top: 0.35rem;
			  color: var(--ink);
			  font-family: var(--font-serif);
			  font-size: var(--type-meta-size);
			  line-height: 1.35;
			  letter-spacing: 0;
			  text-transform: none;
			  font-weight: 400;
			}

			.match-meta__subtext {
			  display: block;
			  margin-top: 0.2rem;
			  color: var(--muted);
			  font-family: var(--font-sans);
			  font-size: 0.62rem;
			  letter-spacing: 0.08em;
			  text-transform: uppercase;
			}

			.match-body {
			  display: grid;
			  grid-template-columns: minmax(0, 1fr);
			  gap: 1rem;
			  margin-top: 1rem;
			}

			.match-copy {
			  display: grid;
			  gap: 0.85rem;
			  min-width: 0;
			  align-content: start;
			}

			.match-body > * {
			  min-width: 0;
			}

			.match-block--primary {
			  margin-top: 1.5rem;
			  padding: var(--block-padding-primary);
			}

			.match-block {
			  padding: var(--block-padding-main);
			  background: var(--block-surface);
			  border: 1px solid var(--rule);
			  border-radius: 0.35rem;
			  min-width: 0;

			.match-copy .match-block {
			  padding: var(--block-padding-main);

			.match-block--play,
			.match-block--form,
			.match-block--status,
			.match-block--market,
			.match-block--decider {
			  isolation: isolate;
			}

			.match-block--head-to-head .mini-table,
			.match-block--win-rate .mini-table,
			.match-block--recent-results .mini-table {
			  width: 100%;

			.mini-table--head-to-head th:first-child,
			.mini-table--head-to-head td:first-child {
			  width: 7.5rem;
			}

			.mini-table--head-to-head th:nth-child(2),
			.mini-table--head-to-head td:nth-child(2) {
			  width: auto;
			}

			.mini-table--head-to-head th:last-child,
			.mini-table--head-to-head td:last-child {
			  width: 9rem;
			}

			.mini-table--head-to-head td:nth-child(2),
			.mini-table--head-to-head td:last-child {
			  overflow-wrap: normal;
			}

			.match-block__label {
			  margin: 0 0 0.45rem;
			  color: var(--theme-base);
			  font-size: var(--type-label-size);
			  font-weight: 700;
			}

			.match-copy .match-block p:not(.match-block__label) {
			  margin: 0;
			  font-family: var(--font-serif);
			  font-size: var(--type-body-size);
			  line-height: var(--leading-body);
			  color: var(--copy);
			}

			.match-block ul {
			  margin: 0;
			  padding-left: 1.1rem;
			}

			.match-copy .match-block li {
			  margin-bottom: 0.5rem;
			  font-family: var(--font-serif);
			  font-size: 1rem;
			  line-height: var(--leading-body);

			.match-copy .match-block .template-spec,
			.match-body .match-block .template-spec,
			.match-copy .match-block .template-spec p,
			.match-copy .match-block .template-spec li,
			.match-body .match-block .template-spec p,
			.match-body .match-block .template-spec li {
			  font-family: var(--font-sans);
			}

			.match-block li:last-child {
			  margin-bottom: 0;
			}

			.mini-table {
			  width: 100%;
			  max-width: 100%;
			  border-collapse: collapse;
			  table-layout: auto;
			  font-size: var(--type-table-size);
			  line-height: 1.45;
			}

			.mini-table th,
			.mini-table td {
			  padding: 0.45rem 0.35rem;
			  border-bottom: 1px solid var(--rule);
			  text-align: left;
			  vertical-align: top;
			  overflow-wrap: normal;
			  word-break: normal;
			  hyphens: none;
			}

			.mini-table td,
			.odds-table td {
			  font-family: var(--font-serif);
			}

			.mini-table th:first-child,
			.mini-table td:first-child,
			.odds-table th:first-child,
			.odds-table td:first-child {
			  white-space: nowrap;
			}

			.mini-table th {
			  color: var(--muted);
			  font-family: var(--font-sans);
			  font-size: 0.62rem;
			  letter-spacing: 0.08em;
			  text-transform: uppercase;
			  font-weight: 900;
			}

			.table-note,
			.match-copy .match-block p.table-note,
			.match-body .match-block p.table-note {
			  margin: 0.55rem 0 0;
			  color: var(--muted);
			  font-family: var(--font-sans);
			  font-size: 0.72rem;
			  letter-spacing: 0.08em;
			  text-transform: none;
			  line-height: 1.3;
			  font-weight: 900;
			}

			.match-subsection__title,
			.match-copy .match-block p.match-subsection__title,
			.match-body .match-block p.match-subsection__title {
			  margin: 0.8rem 0 0.4rem;
			  color: var(--muted);
			  font-family: var(--font-sans);
			  font-size: 0.74rem;
			  letter-spacing: 0.08em;
			  text-transform: uppercase;
			  font-weight: 900;
			}

			.match-subsection__title:first-of-type {
			  margin-top: 0.15rem;
			}

			.match-subsections--stacked {
			  display: grid;
			  grid-template-columns: minmax(0, 1fr);
			  gap: 0.25rem;
			}

			.mini-table tr:last-child td {
			  border-bottom: 0;
			}

			.mini-table--recent-results th:first-child,
			.mini-table--recent-results td:first-child {
			  width: 7.5rem;
			}

			.mini-table--recent-results th:nth-child(2),
			.mini-table--recent-results td:nth-child(2) {
			  width: auto;
			}

			.mini-table--recent-results th:last-child,
			.mini-table--recent-results td:last-child {
			  width: 7.5rem;
			}

			.mini-table--recent-results td:nth-child(2),
			.mini-table--recent-results td:last-child {
			  overflow-wrap: normal;
			}

			.mini-table--head-to-head td:last-child,
			.mini-table--recent-results td:last-child {
			  white-space: nowrap;
			}

			.odds-table {
			  width: 100%;
			  border-collapse: collapse;
			  table-layout: auto;
			  font-size: var(--type-table-size);
			  line-height: 1.45;
			}

			.odds-table th,
			.odds-table td {
			  padding: 0.58rem 0.45rem;
			  border-bottom: 1px solid var(--rule);
			  text-align: left;
			  vertical-align: top;
			  overflow-wrap: normal;
			}

			.odds-table th:first-child,
			.odds-table td:first-child {
			  width: 46%;
			  padding-right: 1.1rem;
			}

			.odds-table th {
			  color: var(--muted);
			  font-family: var(--font-sans);
			  font-size: 0.62rem;
			  letter-spacing: 0.08em;
			  text-transform: uppercase;
			  font-weight: 900;
			}

			.odds-table tr:last-child td {
			  border-bottom: 0;
			}

			.odds-callout {
			  margin-top: 0.8rem !important;
			  padding: 0.7rem 0.8rem;
			  border-radius: 0.35rem;
			  border: 1px solid var(--flag-border);
			  background: var(--callout-surface);
			}

			.odds-callout strong {
			  font-family: var(--font-sans);
			  color: var(--theme-dark);
			}

			.footer-note {
			  margin: 1rem 0 0;
			  padding: 0.8rem 1rem;
			  color: var(--muted);
			  font-size: var(--type-note-size);
			  line-height: var(--leading-note);
			  border: 1px solid var(--rule);
			  border-radius: 0.35rem;
			  background: var(--footer-surface);
			}

			@media (max-width: 980px) {
			  .match-meta {
			    grid-template-columns: repeat(2, minmax(0, 1fr));
			  }

			  .match-body {
			    grid-template-columns: 1fr;
			  }
			}

			@media (max-width: 720px) {
			  .page-shell {
			    width: min(100vw, calc(100vw - 0.8rem));
			    margin: 0.4rem auto 1rem;
			    padding: 0.4rem;
			  }

			  .masthead,
			  .match-section {
			    padding: 0.9rem;
			    border-radius: 0.35rem;
			  }

			  .masthead__rail,
			  .match-meta {
			    grid-template-columns: 1fr;
			    display: grid;
			    gap: 0.35rem;
			  }

			  .match-section__title {
			    gap: 0.35rem;
			  }

			  .match-title__separator {
			    width: auto;
			    line-height: inherit;
			  }
			}
		</style>
	</head>
	<body>
		<div class="page-shell">
			<header class="masthead">
				<div class="masthead__rail">{{railItems}}</div>
				<h1 class="masthead__title">{{title}}</h1>
				<p class="masthead__date">{{dateLine}}</p>
				<p class="masthead__deck">
					Ett dagligt ATP-nyhetsblad med kommande singelmatcher, match för match, med spelbild, form, inbördes möten, odds och verifierat dagsläge i fokus.
				</p>
			</header>

			<main class="match-list">{{matchSections}}</main>

			<p class="footer-note">{{footerNote}}</p>

			<template id="fixed-match-section-template">
				<section class="match-section">
					<p class="template-preview-label">{{Show start time}} · {{Show tournament}} · {{Show round}}</p>
					<div class="template-spec">
						<p>
                            Show flag, full name, country, and ranking for each player, and keep both sides visually aligned.
                            Make sure to have some space between the two sides and a clear separator. 
                        </p>
					</div>
					<h2 class="match-section__title" data-slot="title">
						<span class="match-title__name">{{Show PlayerA vs PlayerB}}</span>
					</h2>
					<p class="match-section__summary" data-slot="summary">
						{{Write a short editorial top summary of the matchup. Explain what the match is likely to hinge on and why the price may or may not tell the full
						story.}}
					</p>
					<div class="match-overview">
						<div class="match-overview__item">
							<span class="match-overview__label">Snabbkoll</span>
							<strong data-slot="snapshot">{{Short market and model read for the match}}</strong>
						</div>
						<div class="match-overview__item">
							<span class="match-overview__label">Matchprofil</span>
							<strong data-slot="match-profile">{{2 to 5 words on the likely matchup pattern}}</strong>
						</div>
						<div class="match-overview__item">
							<span class="match-overview__label">Dagsläge</span>
							<strong data-slot="risk-flag">{{Short current-status note or main uncertainty}}</strong>
						</div>
					</div>
					<div class="match-meta">
						<div class="match-meta__item">Nyckelfråga<strong data-slot="key-question">{{Write one short question that frames the hinge of the match}}</strong></div>
						<div class="match-meta__item">YTD<strong data-slot="record">{{Show season record for both players}}</strong></div>
						<div class="match-meta__item">
							<span data-slot="surface-label">{{Show surface profile label}}</span
							><strong data-slot="surface-value"
								>{{Show surface-specific comparison}}<span class="match-meta__subtext" data-slot="surface-subtext"
									>{{Show supporting rank or rating context}}</span
								></strong
							>
						</div>
					</div>

					<article class="match-block match-block--primary match-block--odds">
						<p class="match-block__label">Odds</p>
						<div class="template-spec">
							<p>
								Show Svenska Spel, Tennis Abstract, and Vitel in one simple table. Keep the cell content compact. For Tennis Abstract and Vitel,
								append positive edge inline after the odds in the same cell, for example 2.34 (+6%). Never show negative edge labels, and end with
								one short Swedish pricing takeaway.
							</p>
						</div>
						<table class="odds-table" data-slot="odds-table">
							<thead>
								<tr>
									<th>Källa</th>
									<th>{{Show PlayerA name}}</th>
									<th>{{Show PlayerB name}}</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td>Svenska Spel</td>
									<td>{{Show Swedish book price for PlayerA}}</td>
									<td>{{Show Swedish book price for PlayerB}}</td>
								</tr>
								<tr>
									<td>Tennis Abstract</td>
									<td>{{TA price for PlayerA, plus positive edge if any}}</td>
									<td>{{TA price for PlayerB, plus positive edge if any}}</td>
								</tr>
								<tr>
									<td>Vitel</td>
									<td>{{Vitel price for PlayerA, plus positive edge if any}}</td>
									<td>{{Vitel price for PlayerB, plus positive edge if any}}</td>
								</tr>
							</tbody>
						</table>
						<p class="odds-callout" data-slot="betting-idea">
							<strong>Spelidé:</strong> {{Write one short betting or pricing takeaway in clear Swedish. Keep it concise and editorial.}}
						</p>
					</article>

					<div class="match-body">
						<div class="match-copy">
							<article class="match-block match-block--play">
								<p class="match-block__label">Spelbild</p>
								<p data-slot="play-pattern">{{Describe the likely match pattern. Explain what each player wants tactically and stylistically.}}</p>
							</article>

							<article class="match-block match-block--form">
								<p class="match-block__label">Form och historik</p>
								<p data-slot="form-history">
									{{Describe both players' recent form and broader context. Prefer concrete record language such as wins and losses over the last
									6 months or last 5 matches.}}
								</p>
							</article>

							<article class="match-block match-block--win-rate">
								<p class="match-block__label">Vinstprocent</p>
								<div class="template-spec">
									<p>
										Each period cell should show total win rate and win rate against better-ranked players for the same span, using
										percentages only. Show players with full names in the left column and keep the table easy to read at a glance.
									</p>
								</div>
								<table class="mini-table" data-slot="win-rate-table">
									<thead>
										<tr>
											<th>Spelare</th>
											<th>3 mån</th>
											<th>6 mån</th>
											<th>12 mån</th>
										</tr>
									</thead>
									<tbody>
										<tr>
											<td>{{Show PlayerA}}</td>
											<td>
												{{Show 3 month win rate and the win rate over better ranked players over the same period. Show
												percentage only}}
											</td>
											<td>
												{{Show 6 month win rate and the win rate over better ranked players over the same period. Show
												percentage only}}
											</td>
											<td>
												{{Show 12 month win rate and the win rate over better ranked players over the same period. Show
												percentage only}}
											</td>
										</tr>
										<tr>
											<td>{{Show PlayerB}}</td>
											<td>
												{{Show 3 month win rate and the win rate over better ranked players over the same period. Show
												percentage only}}
											</td>
											<td>
												{{Show 6 month win rate and the win rate over better ranked players over the same period. Show
												percentage only}}
											</td>
											<td>
												{{Show 12 month win rate and the win rate over better ranked players over the same period. Show
												percentage only}}
											</td>
										</tr>
									</tbody>
								</table>
								<p class="table-note" data-slot="win-rate-note">
									{{Explain that each cell shows overall win rate / win rate against better-ranked players for the same period}}
								</p>
							</article>

							<article class="match-block match-block--recent-results">
								<p class="match-block__label">Senaste resultat</p>
								<div class="template-spec">
									<p>
										Render two stacked subsections, one per player. Use full player names and keep the table columns as
										Datum, Spelare, Resultat. 
									</p>
								</div>
								<div class="match-subsections match-subsections--stacked">
									<p class="match-subsection__title" data-slot="recent-results-player-a-title">{{Show PlayerA}}</p>
									<table class="mini-table mini-table--recent-results" data-slot="recent-results-player-a">
										<thead>
											<tr>
												<th>Datum</th>
												<th>Spelare</th>
												<th>Resultat</th>
											</tr>
										</thead>
										<tbody>
											<tr>
												<td>{{YYYY-MM-DD}}</td>
												<td>{{Show winner}} #{{Show winner rank}} vs {{Show loser}} #{{Show loser rank}}</td>
												<td>{{Show winner score}}</td>
											</tr>
											<tr>
												<td>{{YYYY-MM-DD}}</td>
												<td>{{Show winner}} #{{Show winner rank}} vs {{Show loser}} #{{Show loser rank}}</td>
												<td>{{Show winner score}}</td>
											</tr>
										</tbody>
									</table>
									<p class="match-subsection__title" data-slot="recent-results-player-b-title">{{Show PlayerB}}</p>
									<table class="mini-table mini-table--recent-results" data-slot="recent-results-player-b">
										<thead>
											<tr>
												<th>Datum</th>
												<th>Spelare</th>
												<th>Resultat</th>
											</tr>
										</thead>
										<tbody>
											<tr>
												<td>{{YYYY-MM-DD}}</td>
												<td>{{Show winner}} #{{Show winner rank}} vs {{Show loser}} #{{Show loser rank}}</td>
												<td>{{Show winner score}}</td>
											</tr>
											<tr>
												<td>{{YYYY-MM-DD}}</td>
												<td>{{Show winner}} #{{Show winner rank}} vs {{Show loser}} #{{Show loser rank}}</td>
												<td>{{Show winner score}}</td>
											</tr>
										</tbody>
									</table>
								</div>
							</article>

							<article class="match-block match-block--head-to-head">
								<p class="match-block__label">Head-to-head</p>
								<div class="template-spec">
									<p>Keep this compact. Show Datum, Spelare, Resultat and present the winner first in the player cell.</p>
								</div>
								<table class="mini-table mini-table--head-to-head" data-slot="head-to-head">
									<thead>
										<tr>
											<th>Datum</th>
											<th>Spelare</th>
											<th>Resultat</th>
										</tr>
									</thead>
									<tbody>
										<tr>
											<td>{{YYYY-MM-DD}}</td>
											<td>{{Show winner}} #{{Show winner rank}} vs {{Show loser}} #{{Show loser rank}}</td>
											<td>{{Show winner score}}</td>
										</tr>
										<tr>
											<td>{{YYYY-MM-DD}}</td>
											<td>{{Show winner}} #{{Show winner rank}} vs {{Show loser}} #{{Show loser rank}}</td>
											<td>{{Show winner score}}</td>
										</tr>
									</tbody>
								</table>
							</article>
							<article class="match-block match-block--status">
								<p class="match-block__label">Skador och dagsläge</p>
								<p data-slot="status">
									{{Describe any verified injury, comeback, layoff, or current status note. Always name the player it applies to.}}
								</p>
							</article>

							<article class="match-block match-block--market">
								<p class="match-block__label">Marknad och modell</p>
								<p data-slot="market-model">
									{{Explain how the market and models relate to each other. Keep the wording plain, short, and in Swedish.}}
								</p>
							</article>

							<article class="match-block match-block--decider">
								<p class="match-block__label">Det avgör</p>
								<p data-slot="decider">{{Write one short closing line on what is most likely to decide the match.}}</p>
							</article>
						</div>
					</div>
				</section>
			</template>
		</div>
	</body>
</html>
